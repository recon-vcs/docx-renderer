<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>docx-vellum playground</title>
	<style>
		body { margin: 0; font-family: system-ui, sans-serif; }
		#toolbar { position: sticky; top: 0; z-index: 10; background: #222; color: #eee; padding: 8px 12px; display: flex; gap: 12px; align-items: center; }
		#toolbar select, #toolbar input { font-size: 14px; }
		#document-container { padding: 24px; background: #ccc; min-height: 100vh; }
	</style>
</head>
<body>
<div id="toolbar">
	<label>Fixture: <select id="fixture-select"></select></label>
	<label>Or file: <input type="file" id="file-input" accept=".docx"></label>
	<span id="status"></span>
</div>
<div id="style-container"></div>
<div id="document-container"></div>
<script type="module" src="/playground/main.ts"></script>
</body>
</html>
